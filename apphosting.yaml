# Firebase App Hosting config for Vite/React SPA
# Build produces static files in apps/web/dist; run command serves them on PORT 8080.

env:
  - variable: VITE_API_URL
    value: https://us-central1-hotel-trends-stage.cloudfunctions.net/api/trpc
    availability:
      - BUILD
  - variable: VITE_FIREBASE_PROJECT_ID
    value: hotel-trends-stage
    availability:
      - BUILD
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: hotel-trends-stage.firebaseapp.com
    availability:
      - BUILD
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: hotel-trends-stage.firebasestorage.app
    availability:
      - BUILD
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: '791396753068'
    availability:
      - BUILD
  - variable: VITE_FIREBASE_API_KEY
    secret: vite-firebase-api-key
    availability:
      - BUILD
  - variable: VITE_FIREBASE_APP_ID
    value: 1:791396753068:web:312429346e625974dcc909
    availability:
      - BUILD

scripts:
  buildCommand: pnpm install --frozen-lockfile && pnpm build
  runCommand: npx serve apps/web/dist -s -l tcp://0.0.0.0:8080

# Keep build output and node_modules so "serve" can run at runtime
outputFiles:
  serverApp:
    include: ['.']
