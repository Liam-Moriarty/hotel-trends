# ============================================================================
# deploy-dev.yml - Continuous Deployment (CD) to Development
# ============================================================================
# CD: Deploys to the "dev" environment when code is pushed to the dev branch.
# - Web app: Deployed by Firebase App Hosting (GitHub integration triggers
#   rollout on push to dev). No Hosting step here.
# - Functions: Deployed by this workflow via Firebase CLI.
# Uses Workload Identity Federation (WIF) for secure, keyless authentication.
#
# Required GitHub Secrets:
#   - GCP_WORKLOAD_IDENTITY_PROVIDER: Full WIF provider resource name, e.g.:
#     projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
#   - GCP_SA_EMAIL: Service account email (e.g. sa@project-id.iam.gserviceaccount.com)
# ============================================================================

name: CD — Deploy to Dev

# ============================================================================
# TRIGGERS
# ============================================================================
on:
  push:
    branches:
      - dev
  workflow_dispatch:

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

# ============================================================================
# CONCURRENCY
# ============================================================================
concurrency:
  group: deploy-dev
  cancel-in-progress: false

# ============================================================================
# JOBS
# ============================================================================
jobs:
  deploy:
    name: Build and Deploy to Dev
    runs-on: ubuntu-latest

    # ========================================================================
    # PERMISSIONS - Required for WIF
    # ========================================================================
    permissions:
      id-token: write # Required to request OIDC token
      contents: read # Required to checkout repo

    # ========================================================================
    # ENVIRONMENT
    # ========================================================================
    environment:
      name: dev
      # Firebase App Hosting URL (update if your backend/project differ)
      url: https://hotel-trends-v1--hotel-trends-stage.us-central1.hosted.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      # ======================================================================
      # WIF Authentication (v0.4.4 + token_format required for Firebase CLI)
      # ======================================================================
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v0.4.4
        with:
          project_id: hotel-trends-stage
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true
          cleanup_credentials: false
          token_format: access_token
          access_token_scopes: |
            email
            openid
            https://www.googleapis.com/auth/cloud-platform
            https://www.googleapis.com/auth/firebase

      # ======================================================================
      # CD: Deploy to Firebase (Functions only; web app via App Hosting)
      # ======================================================================
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project dev --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        continue-on-error: true # Skip if no functions configured

      - name: Deployment Summary
        run: |
          echo "## 🚀 CD — Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Web app**: Deployed by [Firebase App Hosting](https://hotel-trends-v1--hotel-trends-stage.us-central1.hosted.app) (on push to \`dev\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
